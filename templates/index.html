<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Rezerwacji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Zarezerwuj wizytę</h2>
    <form action="/rezerwuj" method="POST">
        <div class="mb-3">
            <label class="form-label">Imię i nazwisko</label>
            <input type="text" class="form-control" name="imie_nazwisko" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Wybierz usługę</label>
            <select class="form-select" name="usluga_id">
                <option value="1">Konsultacja</option>
                <option value="2">Serwis sprzętu</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Data i godzina</label>
            <input type="datetime-local" class="form-control" name="data_wizyty" required>
        </div>
        <button type="submit" class="btn btn-primary">Rezerwuj</button>
    </form>
</body>
</html>
