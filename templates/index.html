<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Rezerwacji - Panel Główny</title>
</head>
<body>
    <h2>Wybierz kategorię usług</h2>

    <div>
        {% for kategoria in kategorie %}
        <div style="border: 1px solid black; margin: 10px; padding: 10px;">
            <h3>{{ kategoria.nazwa }}</h3>
            <a href="{{ url_for('wybierz_date', kategoria_id=kategoria.id) }}">Przejdź do rezerwacji</a>
        </div>
        {% endfor %}
    </div>

    <hr>
    <a href="{{ url_for('wyloguj') }}">Wyloguj się</a>
</body>
</html>
