<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System rezerwacji-panel logowania</title>
    <link href="/static/style1.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="login">
    <main class="login__main">
        <header class="login__main--header">
            <h2>Panel logowania</h2>
        </header>
    <form method="post" class="login__form">

            <fieldset>
            <legend>Zaloguj się na swoje konto</legend>
            <label for="userEmail">Email:</label>
            <input class="login__email" placeholder="📧 email@.pl" id="userEmail" type="email" name="userEmail" required/>

            <label for="userPassword">Hasło:</label>
            <input class="login__haslo" placeholder="🔐 min.6 znaków" id="userPassword" type="password" name="userPassword" required/>

            <button class="login__button">Zaloguj</button>

            </fieldset>
            <div class="login__rejestracja">
            Nie masz konta? <a href="rejestracja.html"> Zarejestruj się</a>
            </div>


            
    </form>

    </main>
    </div>
</body>
</html>
